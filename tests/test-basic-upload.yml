name: Test basic upload inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create file to upload
        run: |
          mkdir -p /tmp/upload-test
          echo "hello world" > /tmp/upload-test/test.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          project_id: 'my-test-project'
          path: '/tmp/upload-test/test.txt'
          destination: 'my-test-bucket/uploads'
      - name: Assert action ran (credentials expected to fail)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with expected outcome"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
