name: Test basic upload inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a test file to upload
        run: |
          mkdir -p /tmp/test-upload
          echo "hello world" > /tmp/test-upload/test.txt

      - id: action
        uses: .
        continue-on-error: true
        with:
          path: '/tmp/test-upload/test.txt'
          destination: 'my-test-bucket'
          project_id: 'my-test-project'
          gzip: 'false'
          resumable: 'false'
          parent: 'false'

      - name: Assert action ran (credentials will fail but inputs were accepted)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail without real GCS credentials
          # We just verify it ran and processed the inputs
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with expected inputs"
