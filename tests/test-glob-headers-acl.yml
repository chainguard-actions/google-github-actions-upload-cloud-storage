name: Test glob, headers, and predefinedAcl inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create files to upload
        run: |
          mkdir -p /tmp/glob-test
          echo "file one" > /tmp/glob-test/one.txt
          echo "file two" > /tmp/glob-test/two.txt
          echo "not matched" > /tmp/glob-test/skip.log
      - id: action
        uses: .
        continue-on-error: true
        with:
          path: '/tmp/glob-test'
          destination: 'my-test-bucket/glob-uploads'
          glob: '*.txt'
          predefinedAcl: 'projectPrivate'
          headers: |-
            content-type: 'text/plain'
            x-goog-meta-env: 'test'
      - name: Assert action ran (credentials expected to fail)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with expected outcome"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
